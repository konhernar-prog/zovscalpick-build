name: build-macos

# Собирает ZoVscalpick.app на маках GitHub (PyInstaller не кросс-компилирует).
# Матрица: Apple Silicon (arm64) и Intel (x86_64) — по одному .app на архитектуру.
#   * arm64  (macos-14): для маков M1/M2/M3… (собирается быстро).
#   * x86_64 (macos-13): работает на Intel-маках И на Apple Silicon через Rosetta 2
#                        (универсальный вариант, но раннер бывает в очереди).
# Запуск: вручную (Actions -> build-macos -> Run workflow) или push в main.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "rebuild/**"
      - ".github/workflows/build-macos.yml"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14      # Apple Silicon (arm64)
            arch: arm64
          - runner: macos-13      # Intel (x86_64) — работает и на Apple Silicon (Rosetta)
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    name: build-${{ matrix.arch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r rebuild/requirements-build.txt

      - name: Build .app with PyInstaller
        working-directory: rebuild
        run: |
          pyinstaller ZoVscalpick-mac.spec --noconfirm --clean

      - name: Zip the .app (ditto keeps bundle perms/symlinks)
        working-directory: rebuild/dist
        run: |
          ditto -c -k --sequesterRsrc --keepParent "ZoVscalpick.app" "ZoVscalpick-macOS-${{ matrix.arch }}.zip"
          ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZoVscalpick-macOS-${{ matrix.arch }}
          path: rebuild/dist/ZoVscalpick-macOS-${{ matrix.arch }}.zip
          if-no-files-found: error
